user root;
worker_processes auto;

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;
    log_format openwrt
            '$request_method $scheme://$host$request_uri => $status'
            ' (${body_bytes_sent}B in ${request_time}s) <- $http_referer';

    sendfile        on;
    keepalive_timeout  30;

    # --- Proxy cache on tmpfs (fast, volatile) ---
    proxy_cache_path /tmp/cache
        levels=1:2
        keys_zone=upstream_cache:5m
        max_size=1m
        inactive=86400s
        use_temp_path=off;

    # Nice-to-have: preserve client IP etc
    proxy_set_header Host              "autoprov.cutel.net";
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    resolver 127.0.0.1 valid=30s;
    resolver_timeout 2s;

    server {

        listen 100.100.100.100:8080;
        server_name _;

        location /autoprov/ {

            # This is a workaround for nginx refusing to start on boot
            # if it can't resolve the upstream.
            set $upstream http://100.64.0.1:8080;

            rewrite ^/autoprov/(.*)$ /$1 break;
            proxy_pass $upstream;

            proxy_cache upstream_cache;

            # Low TTL, but always check upstream
            proxy_cache_valid 200 1s;
            proxy_cache_valid any 0s;

            # Always revalidate (uses If-Modified-Since / ETag when available)
            # proxy_cache_revalidate on;

            # If a cached response exists, serve it when upstream is sad/slow
            proxy_cache_use_stale
                error
                timeout
                #updating
                http_500
                http_502
                http_503
                http_504;

            # Fetch updates in the background while serving stale
            proxy_cache_background_update off;

            # Timeouts matter on embedded links
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;

            # Explicit cache key
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Don't let upstream headers prevent caching (optional but common)
            proxy_ignore_headers Cache-Control Expires Set-Cookie;

            # Debug header so you can see HIT/MISS/STALE/UPDATING
            add_header X-Cache $upstream_cache_status always;

            etag off;
            if_modified_since off;
        }

        location /ddns/ {

            # Resolve at request time, same idea as /autoprov/
            set $upstream https://dyn.dns.he.net;

            rewrite ^/ddns/(.*)$ /$1 break;
            proxy_pass $upstream;

            # Override global Host header for this upstream
            proxy_set_header Host dyn.dns.he.net;
            proxy_ssl_server_name on;
            proxy_ssl_name dyn.dns.he.net;

            # No cache, no extras
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
        }

        # Optional: quick health check endpoint
        location = /nginx-health {
            return 200 "ok\n";
        }
    }
}
